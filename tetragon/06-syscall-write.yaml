apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: syscall-write
spec:
  podSelector:
    matchLabels:
      app: tetragon-demo
  kprobes:
  - call: "sys_write"
    syscall: true
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "char_buf"
      sizeArgIndex: 3
    - index: 2
      type: "size_t"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "1"
        - "2"
