apiVersion: v1
kind: Pod
metadata:
  name: client-mount
  namespace: default
  labels:
    app: tetragon-demo
    tetragon-demo: mount
spec:
  containers:
  - name: mount
    image: busybox:latest
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      capabilities:
        add: ["SYS_ADMIN"]
