---
# Role: what the application is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: my-app-role
  namespace: auth-demo
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["my-app-secret"]   # only this specific secret, not all secrets
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# RoleBinding: bind the ServiceAccount to the Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: my-app-binding
  namespace: auth-demo
subjects:
- kind: ServiceAccount
  name: my-app
  namespace: auth-demo
roleRef:
  kind: Role
  name: my-app-role
  apiGroup: rbac.authorization.k8s.io
