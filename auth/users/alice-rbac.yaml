---
# Namespace where alice will work
apiVersion: v1
kind: Namespace
metadata:
  name: auth-demo

---
# Role: permissions scoped to namespace auth-demo only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: auth-demo
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding: bind alice to Role developer in auth-demo
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alice-developer
  namespace: auth-demo
subjects:
- kind: User
  name: alice        # CN from the certificate
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io

---
# Alternative: bind by group — grants access to everyone in the developers group
# (O field from the certificate = group in Kubernetes)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developers-readonly
  namespace: auth-demo
subjects:
- kind: Group
  name: developers   # O from the certificate
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io
