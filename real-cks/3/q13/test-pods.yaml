# metadata-server — simulates the cloud metadata endpoint at 192.168.100.21:9055
# In the real exam this IP exists on the network; here we simulate it as a ClusterIP Service
# The CiliumNetworkPolicy egressDeny blocks access to the real external IP 192.168.100.21:9055
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-server
  namespace: metadata-access
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-server
  template:
    metadata:
      labels:
        app: metadata-server
    spec:
      containers:
        - name: server
          image: python:3-alpine
          command: ["python3", "-m", "http.server", "9055"]
          ports:
            - containerPort: 9055
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-server
  namespace: metadata-access
spec:
  selector:
    app: metadata-server
  ports:
    - port: 9055
      targetPort: 9055
---
# pod2 — nginx, target for same-namespace egress test
apiVersion: v1
kind: Pod
metadata:
  name: pod2
  namespace: metadata-access
  labels:
    app: pod2
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pod2
  namespace: metadata-access
spec:
  selector:
    app: pod2
  ports:
    - port: 80
      targetPort: 80
---
# pod1 — tests connectivity to metadata server and pod2
# Before policy: both reachable
# After policy:  192.168.100.21:9055 blocked, pod2 OK
apiVersion: v1
kind: Pod
metadata:
  name: pod1
  namespace: metadata-access
  labels:
    app: pod1
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          while true; do
            echo "=== $(date) ==="
            echo -n "[metadata-server:9055] "
            curl -s --max-time 3 http://192.168.100.21:9055 && echo "OK" || echo "FAILED/TIMEOUT"
            echo -n "[pod2:80] "
            curl -s --max-time 3 http://pod2.metadata-access.svc.cluster.local && echo "OK" || echo "FAILED"
            sleep 5
          done
