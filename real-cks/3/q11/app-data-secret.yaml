# Converted from ConfigMap app-data.
# Use stringData so values stay as plain text (no base64 encoding needed).
# Keys must match exactly what the ConfigMap had.
apiVersion: v1
kind: Secret
metadata:
  name: app-data
  namespace: team-khaki-us-east-ad1
immutable: true
stringData:
  app.interface.properties: |
    load=lazy3
    loader-lazy3.v3.loader allow.renew=true
    allow.pass=c395e8d2
  interface_file_name: app.interface.properties
  token: c395e8d2-2525-4621-a99e-9bf111f4caeb
