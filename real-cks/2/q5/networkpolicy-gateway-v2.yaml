apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-v2-egress
  namespace: team-ivy-gateway
spec:
  podSelector:
    matchLabels:
      app: gateway-v2
  policyTypes:
    - Egress
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Only to team-ivy-private on ports 4000 and 5000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-ivy-private
          podSelector:
            matchLabels:
              app: api-private
      ports:
        - port: 4000
          protocol: TCP
        - port: 5000
          protocol: TCP
