apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: team-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          # BAD: password fetched from Secret but then echoed in command — visible in logs
          command:
            - sh
            - -c
            - |
              echo "Starting redis with password: $REDIS_PASSWORD"
              redis-server --requirepass $REDIS_PASSWORD
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
