# Existing policy — do not modify
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: default-allow
  namespace: team-iris
spec:
  endpointSelector: {}
  egress:
    # Allow all intra-namespace traffic
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: team-iris
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
  ingress:
    # Allow all intra-namespace traffic
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: team-iris
