#      hostPath:
#        path: /etc/kubernetes/webhook   # on exam: /opt/course/12/webhook
#        type: DirectoryOrCreate

# Full snippets to copy-paste:

# --- command flags ---
command_flags: |
  - --enable-admission-plugins=NodeRestriction,ImagePolicyWebhook
  - --admission-control-config-file=/etc/kubernetes/webhook/admission-config.yaml

# --- volumeMount ---
volume_mount: |
  - mountPath: /etc/kubernetes/webhook
    name: webhook-config
    readOnly: true

# --- volume ---
volume: |
  - name: webhook-config
    hostPath:
      path: /etc/kubernetes/webhook   # on exam: /opt/course/12/webhook
      type: DirectoryOrCreate
