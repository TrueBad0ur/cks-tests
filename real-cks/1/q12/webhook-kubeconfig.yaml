apiVersion: v1
kind: Config
clusters:
  - name: image-policy-webhook
    cluster:
      # Use ClusterIP directly — apiserver runs on host network and cannot resolve *.svc DNS names
      server: http://<CLUSTER-IP>:8080/validate
      # For TLS: uncomment and set CA cert
      # certificate-authority: /etc/kubernetes/webhook/ca.crt
users:
  - name: apiserver-client
    user: {}
      # For TLS mutual auth:
      # client-certificate: /etc/kubernetes/webhook/client.crt
      # client-key: /etc/kubernetes/webhook/client.key
contexts:
  - name: webhook
    context:
      cluster: image-policy-webhook
      user: apiserver-client
current-context: webhook
