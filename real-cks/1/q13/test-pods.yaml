# pod2 — nginx, target for same-namespace egress test
apiVersion: v1
kind: Pod
metadata:
  name: pod2
  namespace: metadata-access
  labels:
    app: pod2
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pod2
  namespace: metadata-access
spec:
  selector:
    app: pod2
  ports:
    - port: 80
      targetPort: 80
---
# metadata-server — simulates the blocked endpoint
# On the exam environment it lives at 192.168.100.21:9055.
# In local cluster: get its ClusterIP after apply, then patch cilium-network-policy.yaml to deny that IP.
apiVersion: v1
kind: Pod
metadata:
  name: metadata-server
  namespace: metadata-access
  labels:
    app: metadata-server
spec:
  containers:
    - name: server
      image: busybox:latest
      command:
        - sh
        - -c
        - |
          while true; do
            echo -e "HTTP/1.1 200 OK\r\nContent-Length: 17\r\n\r\nmetadata response" | nc -l -p 9055
          done
      ports:
        - containerPort: 9055
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-server
  namespace: metadata-access
spec:
  selector:
    app: metadata-server
  ports:
    - port: 9055
      targetPort: 9055
---
# pod1 — continuously curls both targets, logs OK/FAILED
# Before policy: both OK
# After policy:  metadata-server FAILED/TIMEOUT, pod2 OK
apiVersion: v1
kind: Pod
metadata:
  name: pod1
  namespace: metadata-access
  labels:
    app: pod1
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          while true; do
            echo "=== $(date) ==="
            echo -n "[metadata-server:9055] "
            curl -s --max-time 3 http://metadata-server.metadata-access.svc.cluster.local:9055 && echo "OK" || echo "FAILED/TIMEOUT"
            echo -n "[pod2:80] "
            curl -s --max-time 3 http://pod2.metadata-access.svc.cluster.local && echo "OK" || echo "FAILED"
            sleep 5
          done
