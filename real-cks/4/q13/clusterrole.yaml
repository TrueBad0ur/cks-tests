apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-signer-csr
rules:
# For "kubectl get csr" — list CertificateSigningRequests (cluster-scoped resource)
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["list", "get"]
# For "kubectl certificate approve" — updates the approval subresource
# This is a SEPARATE resource from certificatesigningrequests itself
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests/approval"]
  verbs: ["update"]
# Also need to be able to approve via the signers
- apiGroups: ["certificates.k8s.io"]
  resources: ["signers"]
  resourceNames:
  - "kubernetes.io/kube-apiserver-client"
  - "kubernetes.io/*"
  verbs: ["approve"]
