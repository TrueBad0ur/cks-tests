---
# secret1: mounted as volume in pod1
# value of "password" key: base64("you-are") = eW91LWFyZQ==
apiVersion: v1
kind: Secret
metadata:
  name: secret1
  namespace: restricted
type: Opaque
data:
  password: eW91LWFyZQ==

---
# secret2: exposed as env var in pod2
# value of "password" key: base64("an-amazing") = YW4tYW1hemluZw==
apiVersion: v1
kind: Secret
metadata:
  name: secret2
  namespace: restricted
type: Opaque
data:
  password: YW4tYW1hemluZw==

---
# secret3: readable via pod3's ServiceAccount token (SA has get/list on secrets)
# value of "password" key: base64("pEnEtRaTiOn-tEsTeR")
apiVersion: v1
kind: Secret
metadata:
  name: secret3
  namespace: restricted
type: Opaque
data:
  password: cEVuRXRSYVRpT24tdEVzVGVS
