---
# Role: allows reading secrets in the restricted namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: restricted
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
# RoleBinding: binds the role to the secret-reader ServiceAccount
# This is what allows pod3 (which uses the secret-reader SA) to curl the API for secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-reader
  namespace: restricted
subjects:
- kind: ServiceAccount
  name: secret-reader
  namespace: restricted
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
