---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: one
  namespace: team-sedum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: one
  template:
    metadata:
      labels:
        app: one
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: two
  namespace: team-sedum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: two
  template:
    metadata:
      labels:
        app: two
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: one
  namespace: team-sedum
spec:
  selector:
    app: one
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: two
  namespace: team-sedum
spec:
  selector:
    app: two
  ports:
  - port: 80
    targetPort: 80
