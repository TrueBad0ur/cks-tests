apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-v1
  namespace: team-ivy-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-v1
  template:
    metadata:
      labels:
        app: gateway-v1
        # api-access-operation=true allows this pod to reach api-private on port 3000
        # (matched by the api-private-access ingress NetworkPolicy in team-ivy-private)
        api-access-operation: "true"
    spec:
      containers:
      - name: gateway-v1
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8080
