apiVersion: v1
kind: Namespace
metadata:
  name: np-6-backend
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-6-gateway
---
# api listens on 8080 and 9090 via two nc processes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: np-6-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: server
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www && echo "api" > /tmp/www/index.html
              busybox httpd -f -p 8080 -h /tmp/www &
              busybox httpd -f -p 9090 -h /tmp/www
          ports:
            - containerPort: 8080
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: np-6-backend
spec:
  selector:
    app: api
  ports:
    - name: port-8080
      port: 8080
      targetPort: 8080
    - name: port-9090
      port: 9090
      targetPort: 9090
---
# gateway-v1: checks both ports
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-v1
  namespace: np-6-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-v1
  template:
    metadata:
      labels:
        app: gateway-v1
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo "=== gateway-v1 ==="
                echo -n "  [api:8080] "
                curl -s --max-time 3 http://api.np-6-backend.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                echo -n "  [api:9090] "
                curl -s --max-time 3 http://api.np-6-backend.svc.cluster.local:9090 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
---
# gateway-v2: checks both ports
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-v2
  namespace: np-6-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-v2
  template:
    metadata:
      labels:
        app: gateway-v2
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo "=== gateway-v2 ==="
                echo -n "  [api:8080] "
                curl -s --max-time 3 http://api.np-6-backend.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                echo -n "  [api:9090] "
                curl -s --max-time 3 http://api.np-6-backend.svc.cluster.local:9090 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
