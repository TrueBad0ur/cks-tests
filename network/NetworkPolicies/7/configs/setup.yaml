apiVersion: v1
kind: Namespace
metadata:
  name: np-7
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: np-7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: server
          image: busybox:latest
          ports:
            - containerPort: 8080
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www && echo "processor" > /tmp/www/index.html
              busybox httpd -f -p 8080 -h /tmp/www &
              while true; do
                echo -n "[->consumer:9090] "
                wget -q -O- --timeout=3 http://consumer.np-7.svc.cluster.local:9090 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
---
apiVersion: v1
kind: Service
metadata:
  name: processor
  namespace: np-7
spec:
  selector:
    app: processor
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: np-7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: server
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www && echo "consumer" > /tmp/www/index.html
              busybox httpd -f -p 9090 -h /tmp/www
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: np-7
spec:
  selector:
    app: consumer
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: np-7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[->processor:8080] "
                curl -s --max-time 3 http://processor.np-7.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intruder
  namespace: np-7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intruder
  template:
    metadata:
      labels:
        app: intruder
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[->processor:8080] "
                curl -s --max-time 3 http://processor.np-7.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                echo -n "[->consumer:9090] "
                curl -s --max-time 3 http://consumer.np-7.svc.cluster.local:9090 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
