apiVersion: v1
kind: Namespace
metadata:
  name: np-10-app
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-10-internal
---
# app: nginx on 8080, curls trusted:9090
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: np-10-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www && echo "app" > /tmp/www/index.html
              busybox httpd -f -p 8080 -h /tmp/www &
              while true; do
                echo -n "[->trusted:9090] "
                wget -q -O- --timeout=3 http://trusted.np-10-internal.svc.cluster.local:9090 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: np-10-app
spec:
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
---
# trusted: role=trusted, curls app:8080, serves on 9090
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trusted
  namespace: np-10-internal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trusted
      role: trusted
  template:
    metadata:
      labels:
        app: trusted
        role: trusted
    spec:
      containers:
        - name: app
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/www && echo "trusted" > /tmp/www/index.html
              busybox httpd -f -p 9090 -h /tmp/www &
              while true; do
                echo -n "[trusted->app:8080] "
                wget -q -O- --timeout=3 http://app.np-10-app.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
---
apiVersion: v1
kind: Service
metadata:
  name: trusted
  namespace: np-10-internal
spec:
  selector:
    app: trusted
  ports:
    - port: 9090
      targetPort: 9090
---
# blocked-internal: role=blocked, also tries to reach app:8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocked-internal
  namespace: np-10-internal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blocked-internal
      role: blocked
  template:
    metadata:
      labels:
        app: blocked-internal
        role: blocked
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[blocked->app:8080] "
                curl -s --max-time 3 http://app.np-10-app.svc.cluster.local:8080 && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 4
              done
