    - containerPort: 80
  - name: test
    image: curlimages/curl:latest
    command: ["sleep", "infinity"]
    securityContext:
      capabilities:
        add:
        - NET_RAW
---
apiVersion: v1
kind: Pod
metadata:
  name: api
  namespace: development
  labels:
    app: api
    tier: backend
spec:
