apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: web-deployer
      containers:
      - name: nginx
        image: nginx:1.25
        securityContext:
          runAsNonRoot: false
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 80
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: web-app
spec:
  containers:
  - name: debug
    image: alpine:latest
    securityContext:
      privileged: true
    command: ["sleep", "infinity"]
